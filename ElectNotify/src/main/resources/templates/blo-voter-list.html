<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>BLO Voters</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f7fa;
}

.card-box{
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.voted{
background:#d4edda;
}

.notvoted{
background:#f8d7da;
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Booth Voters</h2>

<div class="card card-box">
<div class="card-body">

<table class="table table-bordered table-hover text-center">

<thead class="table-dark">

<tr>
<th>S.No</th>
<th>Name</th>
<th>Voter ID</th>
<th>Phone</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody>

<tr th:each="v : ${voters}"
    th:class="${v.voted} ? 'voted' : 'notvoted'">

<td th:text="${v.sno}"></td>
<td th:text="${v.voterName}"></td>
<td th:text="${v.voterId}"></td>
<td th:text="${v.phoneNumber}"></td>

<td>

<span th:if="${v.voted}" class="badge bg-success">
Voted
</span>

<span th:unless="${v.voted}" class="badge bg-danger">
Not Voted
</span>

</td>

<td>

<a th:if="${!v.voted}"
th:href="@{/blo/markVoted/{sno}(sno=${v.sno})}"
class="btn btn-sm btn-success">

Mark Voted

</a>

<span th:if="${v.voted}" class="text-muted">
Done
</span>

</td>

</tr>

</tbody>

</table>

</div>
</div>

<div class="text-center mt-3">

<a href="/blo/dashboard" class="btn btn-primary">
Back to Dashboard
</a>

</div>

</div>

</body>
</html>
