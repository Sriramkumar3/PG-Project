<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>Voter List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.voted{
background:#d4edda !important;
}

</style>

</head>

<body>

<div class="container mt-4">

<h2 class="text-primary mb-4">Voter List</h2>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Name</th>
<th>Village</th>
<th>Booth</th>
<th>Status</th>
</tr>

</thead>

<tbody>

<tr th:each="voter : ${voters}"
th:classappend="${voter.voted} ? 'voted'">

<td th:text="${voter.voterId}"></td>
<td th:text="${voter.voterName}"></td>
<td th:text="${voter.booth.village}"></td>
<td th:text="${voter.booth.boothId}"></td>

<td>

<span th:if="${voter.voted}" class="badge bg-success">Voted</span>
<span th:unless="${voter.voted}" class="badge bg-danger">Not Voted</span>

</td>

</tr>

</tbody>

</table>

<a href="/admin/voters/new" class="btn btn-secondary">Add Voter</a>
<a href="/admin/dashboard" class="btn btn-secondary">Back</a>

</div>

</body>
</html>
