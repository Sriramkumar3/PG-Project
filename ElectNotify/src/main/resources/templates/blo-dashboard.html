<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>BLO Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }
        .card-box {
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .big-number {
            font-size: 28px;
            font-weight: bold;
        }
        .progress {
            height: 30px;
            border-radius: 20px;
        }
        .progress-bar {
            font-weight: bold;
        }
    </style>

</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">BLO Live Voting Dashboard</h2>

    <div class="row text-center">

        <!-- Total Voters -->
        <div class="col-md-4 mb-3">
            <div class="card card-box bg-primary text-white">
                <div class="card-body">
                    <h5>Total Voters</h5>
                    <div class="big-number" th:text="${total}"></div>
                </div>
            </div>
        </div>

        <!-- Voted -->
        <div class="col-md-4 mb-3">
            <div class="card card-box bg-success text-white">
                <div class="card-body">
                    <h5>Voted</h5>
                    <div class="big-number" th:text="${voted}"></div>
                </div>
            </div>
        </div>

        <!-- Remaining -->
        <div class="col-md-4 mb-3">
            <div class="card card-box bg-danger text-white">
                <div class="card-body">
                    <h5>Remaining</h5>
                    <div class="big-number" th:text="${remaining}"></div>
                </div>
            </div>
        </div>

    </div>

    <!-- Progress Section -->

    <div class="card card-box mt-4">
        <div class="card-body">

            <h5 class="text-center mb-3">
                Voting Progress : 
                <span th:text="${percentage} + '%'"></span>
            </h5>

            <div class="progress">
                <div class="progress-bar bg-success"
                     role="progressbar"
                     th:style="'width:' + ${percentage} + '%'"
                     th:text="${percentage} + '%'">
                </div>
            </div>

        </div>
    </div>

    <!-- Quick Action Buttons -->

    <div class="text-center mt-4">
        <a href="/blo/voters" class="btn btn-outline-primary me-2">
            View Voters
        </a>

        <a href="/logout" class="btn btn-outline-danger">
            Logout
        </a>
    </div>

</div>

</body>
</html>
