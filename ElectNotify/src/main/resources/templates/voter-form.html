<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>Add Voter</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.form-card{
width:500px;
margin:auto;
margin-top:60px;
padding:30px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
background:white;
}

</style>

</head>

<body>

<div class="form-card">

<h3 class="text-center text-primary">Add Voter</h3>

<form th:action="@{/admin/voter/save}" method="post">

<div class="mb-3">
<label>Voter Name</label>
<input type="text" name="voterName" class="form-control" required>
</div>

<div class="mb-3">
<label>Aadhaar No</label>
<input type="text" name="aadhaarNo" class="form-control">
</div>

<div class="mb-3">
<label>Voter ID</label>
<input type="number" name="voterId" class="form-control">
</div>

<div class="mb-3">
<label>Date Of Birth</label>
<input type="date" name="dob" class="form-control">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control">
</div>

<div class="mb-3">
<label>Phone Number</label>
<input type="text" name="phoneNumber" class="form-control">
</div>

<div class="mb-3">

<label>Booth</label>

<select name="boothId" class="form-control">

<option th:each="booth : ${booths}"
th:value="${booth.boothId}"
th:text="${booth.Village}">
</option>

</select>

</div>

<button class="btn btn-primary w-100">
Save Voter
</button>

</form>

</div>

</body>
</html>
