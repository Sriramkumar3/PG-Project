<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">Add BLO User</h2>

    <form th:action="@{/admin/save-user}" th:object="${user}" method="post">

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" th:field="*{username}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" th:field="*{password}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Role</label>
            <select th:field="*{role}" class="form-control">

                <option value="BLO">BLO</option>
                <option value="ADMIN">ADMIN</option>

            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Assign Booth</label>

            <select th:field="*{booth}" class="form-control">

                <option th:each="b : ${booths}"
                        th:value="${b.boothId}"
                        th:text="${b.village + ' - ' + b.city}">
                </option>

            </select>

        </div>

        <button type="submit" class="btn btn-primary">
            Create User
        </button>

    </form>

</div>

</body>
</html>
