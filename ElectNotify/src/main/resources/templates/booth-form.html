<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>Add Booth</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#eef2f7;
}

.form-card{
max-width:500px;
margin:auto;
margin-top:60px;
padding:30px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
background:white;
}

</style>

</head>

<body>

<div class="form-card">

<h3 class="text-center text-primary">Add Booth</h3>

<form th:action="@{/admin/booth/save}" method="post" th:object="${booth}">

<div class="mb-3">
<label>City</label>
<input type="text" name="city" class="form-control" required>
</div>

<div class="mb-3">
<label>Constituency</label>
<input type="text" name="constituency" class="form-control" required>
</div>

<div class="mb-3">
<label>Village</label>
<input type="text" name="village" class="form-control" required>
</div>

<div class="mb-3">
<label>BLO Name</label>
<input type="text" name="bloName" class="form-control" required>
</div>

<div class="mb-3">
<label>BLO Number</label>
<input type="number" name="bloNumber" class="form-control" required>
</div>

<div class="mb-3">
<label>Total Voters</label>
<input type="number" name="totalVoter" class="form-control" required>
</div>

<button class="btn btn-primary w-100">Save Booth</button>

</form>

</div>

</body>
</html>
