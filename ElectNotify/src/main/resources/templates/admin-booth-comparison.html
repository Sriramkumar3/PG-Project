<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Booth Comparison</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

<h2 class="mb-4">Booth Voting Comparison</h2>

<table class="table table-bordered">

<thead class="table-dark">
<tr>
<th>Booth ID</th>
<th>Village</th>
<th>City</th>
<th>Voting Percentage</th>
</tr>
</thead>

<tbody>

<tr th:each="booth : ${booths}">

<td th:text="${booth.boothId}"></td>
<td th:text="${booth.Village}"></td>
<td th:text="${booth.city}"></td>

<td>
<span th:text="${boothPercentages[booth.boothId]} + '%'"></span>
</td>

</tr>

</tbody>

</table>

</body>
</html>
