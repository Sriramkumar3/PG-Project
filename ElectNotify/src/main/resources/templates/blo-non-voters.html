<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Non Voters</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.card-box{
border-radius:12px;
box-shadow:0 3px 12px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4 text-danger">
Non Voters List
</h2>

<div class="card card-box">

<div class="card-body">

<table class="table table-bordered table-hover text-center">

<thead class="table-danger">

<tr>
<th>S.No</th>
<th>Name</th>
<th>Voter ID</th>
<th>Phone</th>
<th>Email</th>
</tr>

</thead>

<tbody>

<tr th:each="v : ${nonVoters}">

<td th:text="${v.sno}"></td>
<td th:text="${v.voterName}"></td>
<td th:text="${v.voterId}"></td>
<td th:text="${v.phoneNumber}"></td>
<td th:text="${v.email}"></td>

</tr>

</tbody>

</table>

</div>

</div>

<div class="text-center mt-3">

<a href="/blo/dashboard" class="btn btn-primary">
Back to Dashboard
</a>

</div>

</div>

</body>

</html>
